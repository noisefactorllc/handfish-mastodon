name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: noisefactorllc/handfish
          path: handfish

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      # Mastodon 4.6 theme bundle (primary deliverable: SCSS entrypoints + themes.yml/locale
      # fragments + Dockerfile) and the standalone CSS (admin Custom CSS box / browser extensions).
      - run: HANDFISH_DIR=$GITHUB_WORKSPACE/handfish npm run build:mastodon46
      - run: HANDFISH_DIR=$GITHUB_WORKSPACE/handfish npm run build:all

      - name: Package Mastodon 4.6 theme bundle
        run: tar -czf "dist/handfish-mastodon-${{ github.ref_name }}-mastodon46.tar.gz" -C dist mastodon46

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: |
            dist/handfish-mastodon-${{ github.ref_name }}-mastodon46.tar.gz
            dist/handfish-mastodon-standalone*.css
